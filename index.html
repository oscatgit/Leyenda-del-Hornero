<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR - Video Único</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 10000; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: sans-serif; text-align: center; padding: 20px;
      }
      #start-btn {
        padding: 20px 40px; background: #4CAF50; color: white;
        border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer;
      }

      #link-btn {
        position: fixed; bottom: 20px; right: 20px; z-index: 1001;
        padding: 10px 20px; background: rgba(0, 0, 0, 0.7);
        color: white; border: 1px solid white; border-radius: 5px;
        font-family: sans-serif; font-size: 14px; cursor: pointer;
        display: none; text-decoration: none;
      }

      .mindar-ui-overlay { display: none !important; }
      canvas { width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0 !important; left: 0 !important; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h2>Experiencia AR Interactiva</h2>
      <p>Apunta al marcador para ver el video</p>
      <button id="start-btn">COMENZAR</button>
    </div>

    <a href="https://www.youtube.com/watch?v=4h09l3bJdeM" target="_blank" id="link-btn">ver más</a>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
      embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="v0" src="./videos/v0.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-plane id="p0" width="1.5" height="1.05" material="shader: flat; src: #v0"></a-plane>
      </a-entity>

    </a-scene>

    <script>
      const btn = document.getElementById('start-btn');
      const linkBtn = document.getElementById('link-btn');
      const video = document.getElementById('v0');

      // Refresco de textura para evitar que el video se vea negro en algunos móviles
      AFRAME.registerComponent('video-refresh', {
        tick: function () {
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        }
      });

      btn.addEventListener('click', () => {
        document.getElementById('overlay').style.display = 'none';
        linkBtn.style.display = 'block';
        document.querySelector('a-scene').systems["mindar-image-system"].start();

        // Preparar el video
        video.muted = false; 
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
        });
        document.getElementById('p0').setAttribute('video-refresh', '');
      });

      // Lógica de detección para el target único
      const target = document.getElementById('target0');
      target.addEventListener("targetFound", () => { video.play(); });
      target.addEventListener("targetLost", () => { video.pause(); });
    </script>
  </body>
</html>
